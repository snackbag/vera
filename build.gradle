plugins {
    id 'java'
}

group = 'net.snackbag.vera'
version = '0.4.2'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'

    implementation 'org.apache.commons:commons-lang3:3.17.0'
}

java {
    withSourcesJar()
}

test {
    useJUnitPlatform()
}